<section id="contact" class="contact py-5">

    <div class="container">

        <div class="section-title text-center">

            <span class="section-subtitle">
                CONTACT
            </span>

            <h2>
                Get In Touch
            </h2>

            <div class="divider"></div>

            <p>
                We'd love to hear from you. Reach out through any of the
                channels below.
            </p>

        </div>

        <div class="row g-4">

            <div class="col-lg-6">

                <div class="contact-card">

                    <h4 class="mb-4">Contact Information</h4>

                    <p>
                        <i class="bi bi-telephone-fill text-warning"></i>
                        {{ business.phone }}
                    </p>

                    <p>
                        <i class="bi bi-envelope-fill text-warning"></i>
                        {{ business.email }}
                    </p>

                    <p>
                        <i class="bi bi-geo-alt-fill text-warning"></i>
                        {{ business.address }}
                    </p>

                    <div class="mt-4">

                        {% if business.instagram %}
                        <a href="{{ business.instagram }}" target="_blank" class="me-3">
                            <i class="bi bi-instagram fs-3"></i>
                        </a>
                        {% endif %}

                        {% if business.facebook %}
                        <a href="{{ business.facebook }}" target="_blank" class="me-3">
                            <i class="bi bi-facebook fs-3"></i>
                        </a>
                        {% endif %}

                    </div>

                </div>

            </div>

            <div class="col-lg-6">

                <div class="contact-card">

                    <h4 class="mb-4">Send Us a Message</h4>

                    <form action="https://api.web3forms.com/submit" method="POST">

    <input
        type="hidden"
        name="access_key"
        value="f9bac137-9c6c-460a-823e-1a3b2dadb781">

    <input
        type="hidden"
        name="subject"
        value="New Contact Message - HOUSE OF BUSOLAMI">

    <input
        type="hidden"
        name="from_name"
        value="HOUSE OF BUSOLAMI Website">

    <div class="mb-3">
        <input
            type="text"
            name="name"
            class="form-control"
            placeholder="Your Name"
            required>
    </div>

    <div class="mb-3">
        <input
            type="email"
            name="email"
            class="form-control"
            placeholder="Your Email"
            required>
    </div>

    <div class="mb-3">
        <textarea
            name="message"
            class="form-control"
            rows="6"
            placeholder="Your Message"
            required></textarea>
    </div>

    <button
        type="submit"
        class="btn btn-gold">
        Send Message
    </button>

    <input
    type="checkbox"
    name="botcheck"
    class="d-none"
    style="display:none">



</form>

                </div>

            </div>

        </div>

    </div>

</section>
