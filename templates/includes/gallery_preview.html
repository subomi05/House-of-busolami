<section id="gallery" class="gallery py-5">

    <div class="container">

        <div class="section-title text-center mb-5">

            <span class="section-subtitle">
                OUR GALLERY
            </span>

            <h2>
                Latest Creations
            </h2>

            <div class="divider"></div>

            <p>
                Explore some of our recent work.
            </p>

        </div>

        <div class="row g-4">

            {% for item in gallery|slice:":6" %}

            <div class="col-lg-4 col-md-6">

                <div class="gallery-card">

                    <img
                        src="{{ item.image.url|add:'?f_auto,q_auto,w=700,c_fill' }}"
                        class="gallery-image"
                        alt="{{ item.title }}"
                        loading="lazy"
                        decoding="async">

                    <div class="gallery-content">

                        <h5>{{ item.title }}</h5>

                        <small>{{ item.get_category_display }}</small>

                    </div>

                </div>

            </div>

            {% empty %}

            <div class="col-12 text-center">

                <h4>No Gallery Items Yet</h4>

                <p class="text-muted">
                    Gallery images will appear here once they are added.
                </p>

            </div>

            {% endfor %}

        </div>

        <div class="text-center mt-5">

            <a href="{% url 'gallery' %}" class="btn btn-gold btn-lg">
                View Full Gallery
            </a>

        </div>

    </div>

</section>
